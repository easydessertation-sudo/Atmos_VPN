workflows:
  atmosvpn-ios:
    name: AtmosVPN iOS Release
    working_directory: frontend
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Pod install
        script: cd ios && pod install
      - name: Fetch and configure profiles
        script: |
          app-store-connect fetch-signing-files "com.vaavix.atmosvpn" \
            --type IOS_APP_STORE \
            --create

          app-store-connect fetch-signing-files "com.vaavix.atmosvpn.AtmosVPNTunnel" \
            --type IOS_APP_STORE \
            --create

          keychain initialize
          keychain add-certificates

          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner
    artifacts:
      - frontend/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
