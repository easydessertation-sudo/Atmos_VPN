workflows:
  atmosvpn-ios:
    name: AtmosVPN iOS Release
    working_directory: frontend
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vaavix.atmosvpn
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          # Automatically fix Xcode 16/17 objectVersion bug for CocoaPods
          sed -i '' 's/objectVersion = 70;/objectVersion = 56;/g' Runner.xcodeproj/project.pbxproj
          
          # Now run pod install safely
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Resolve SPM Dependencies
        script: |
          MAX_RETRIES=4
          count=0
          
          # Xcode 15 SPM Binary Bug Workaround Loop
          while [ $count -lt $MAX_RETRIES ]; do
             echo "Clearing SwiftPM artifacts cache..."
             rm -rf $HOME/Library/Caches/org.swift.swiftpm/artifacts
             
             echo "Resolving dependencies (Attempt $((count+1)) of $MAX_RETRIES)..."
             if xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner; then
                 echo "✅ Successfully resolved all SPM dependencies!"
                 break
             fi
             
             count=$((count+1))
             echo "❌ Resolution failed due to Xcode concurrency bug. Retrying in 5 seconds..."
             sleep 5
          done
          
          if [ $count -eq $MAX_RETRIES ]; then
             echo "🚨 Failed to resolve dependencies after $MAX_RETRIES attempts."
             exit 1
          fi

      - name: Build and Archive
        script: |
          # Build the app
          flutter build ios --release --no-codesign
          
          # Archive the workspace
          xcodebuild archive -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/Runner.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual
            
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
