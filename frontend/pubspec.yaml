name: AtmosVPN
description: A new Flutter project for AtmosVPN.
publish_to: 'none'
version: 1.0.10+24

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  http: ^1.1.0
  provider: ^6.1.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  wireguard_flutter:
    path: ./packages/wireguard_flutter
  cryptography: ^2.7.0
  google_mobile_ads: ^8.0.0
  connectivity_plus: ^7.1.1
  google_sign_in: ^7.2.0
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  app_links: ^7.0.0
  image_picker: ^1.2.2
  sign_in_with_apple: ^8.0.0
  package_info_plus: ^10.1.0
  upgrader: ^13.4.0
  in_app_review: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
